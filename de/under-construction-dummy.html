<!DOCTYPE html>
<!-- Deployment: 2026-03-24 -->
<!-- Modification: 2026-03-24 -->
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Vorbereitung | Archiv der Resonanz</title>

    <!-- Das Standard-Favicon für den Browser-Tab (32x32 oder 64x64 png) -->
    <link rel="icon" type="image/png" href="../assets/images/Favicon_sfai__64.png">
    <!-- Das Icon für Apple/iOS Geräte (180x180 png) -->
    <link rel="apple-touch-icon" href="../assets/images/Favicon_sfai_180.png">

    <style>
        body {
            background-color: #001f3f; /* Dein tiefes Blau */
            color: #00cccc;           /* Dein Türkis */
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #00cccc;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 204, 204, 0.2);
        }
        .loading-bar {
            width: 200px;
            height: 4px;
            background: #003366;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }
        .loading-bar::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #00cccc;
            animation: loading 2s infinite;
        }
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        h1 { font-size: 1.5rem; letter-spacing: 2px; }
        p { color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ARCHIV DER RESONANZ</h1>
        <div class="loading-bar"></div>
        <p>RE-INSTANZIIERUNG LÄUFT...</p>
        <p style="font-size: 0.7rem; margin-top: 20px;">[ SYSTEM IM WARTUNGSMODUS ]</p>
    </div>
</body>
</html>
